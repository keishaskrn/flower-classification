<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Klasifikasi Bunga</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:linear-gradient(
                135deg,
                #ffd6e8,
                #ffeef5,
                #fff6fb
            );
        }

        .container{

            width:420px;

            background:white;

            padding:40px;

            border-radius:25px;

            box-shadow:0 10px 30px rgba(0,0,0,0.15);

            text-align:center;
        }

        h1{
            color:#ff4f8b;
            margin-bottom:10px;
        }

        p{
            color:gray;
            margin-bottom:20px;
        }

        input[type=file]{

            width:100%;

            padding:10px;

            margin-bottom:20px;

            background:#fff0f5;

            border-radius:10px;
        }

        button{

            width:100%;

            padding:14px;

            border:none;

            border-radius:12px;

            background:#ff4f8b;

            color:white;

            font-size:16px;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{

            background:#ff2f74;

            transform:scale(1.03);
        }

        .hasil{

            margin-top:25px;

            background:#fff0f5;

            padding:15px;

            border-radius:15px;

            color:#ff2f74;

            font-weight:bold;
        }

        img{

            width:200px;

            margin-top:20px;

            border-radius:15px;
        }

        .flower{
            font-size:50px;
            margin-bottom:10px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="flower">🌸</div>

    <h1>Klasifikasi Bunga</h1>

    <p>
        Random Forest Flower Classification
    </p>

    <form action="/predict" method="POST" enctype="multipart/form-data">

        <input type="file" name="image" required>

        <button type="submit">
            Prediksi Bunga
        </button>

    </form>

    {% if prediction %}

    <div class="hasil">

        Hasil Prediksi:
        <br><br>

        {{ prediction }}

    </div>

    <img src="{{ image_path }}">

    {% endif %}

</div>

</body>
</html>
